{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/signup.css' %}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-blur-circle"></div>
    
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-subtitle">Готово</span>
            <h1>ПАРОЛЬ <span class="accent-text">ОБНОВЛЕН</span></h1>
        </div>

        <div class="auth-body" style="text-align: center; margin: 30px 0; color: rgba(255,255,255,0.8);">
            <p>Ваш новый пароль был успешно установлен. Теперь вы можете войти в свой аккаунт.</p>
        </div>

        <div class="auth-footer">
            <a href="{% url 'login' %}" class="btn-submit" style="text-decoration: none; display: flex; justify-content: center; align-items: center; width: 100%;">
                <span style="color: #fff; font-weight: 700; text-transform: uppercase;">ВОЙТИ В СИСТЕМУ</span>
                <i class="arrow-icon" style="margin-left: 10px; color: #fff;">→</i>
            </a>
        </div>
    </div>
</div>
{% endblock %}
