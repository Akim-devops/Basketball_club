{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <!-- Используем твои стили от регистрации -->
    <link rel="stylesheet" href="{% static 'css/signup.css' %}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-blur-circle"></div>
    
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-subtitle">Письмо отправлено</span>
            <h1>ПРОВЕРЬТЕ <span class="accent-text">ПОЧТУ</span></h1>
        </div>

        <div class="auth-body" style="text-align: center; margin: 30px 0; color: rgba(255,255,255,0.8); line-height: 1.6;">
            <p>Мы отправили инструкции по восстановлению пароля на ваш Email.</p>
            <p>Если письма долго нет, проверьте папку <strong>"Спам"</strong>.</p>
        </div>

        <div class="auth-footer" style="margin-top: 30px;">
            <a href="{% url 'login' %}" class="btn-submit" style="text-decoration: none; display: flex; align-items: center; justify-content: center; width: 100%;">
                <span style="color: #fff; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">ВЕРНУТЬСЯ К ВХОДУ</span>
                <i class="arrow-icon" style="margin-left: 10px; color: #fff;">→</i>
            </a>
        </div>

    </div>
</div>
{% endblock %}
