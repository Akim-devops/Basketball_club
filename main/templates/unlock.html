{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/signup.css' %}">
    <style>
        /* Прячем всё лишнее на этой странице через CSS */
        header, footer, .nav, .footer-section { 
            display: none !important; 
        }

        .unlock-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999; /* Поверх всего */
        }

        .unlock-card {
            position: relative;
            z-index: 10000; /* Самый верхний слой для кликов */
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }
        .unlock-card h1 {
            margin: 30px;
        }

        /* Убедимся, что инпуты не прозрачные и видны */
        .auth-input {
            background: #111 !important;
            color: #fff !important;
            border: 1px solid #222 !important;
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
        }
    </style>
{% endblock %}

{% block content %}
<div class="unlock-wrapper">
    <div class="unlock-card">
        <h1>ВВЕДИТЕ <span class="accent-text">КОД ДОСТУПА</span></h1>
        
        <form method="post" class="auth-form">
            {% csrf_token %}
            <!-- Поле ввода. Обязательно name="site_password" -->
            <input type="password" 
                   name="site_password" 
                   class="auth-input" 
                   placeholder="Код доступа" 
                   required 
                   autofocus>
            
            <button type="submit" class="btn-submit" style="margin-top: 20px; width: 100%;">
                <span>ОТКРЫТЬ ДОСТУП</span>
            </button>
        </form>
    </div>
</div>
{% endblock %}
