{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/signup.css' %}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-blur-circle"></div>
    
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-subtitle">New player</span>
            <h1>СТАТЬ ЧАСТЬЮ <span class="accent-text">ЧИТЫ</span></h1>
        </div>

        <form method="post" class="auth-form">
            {% csrf_token %}
            
            <div class="form-grid">
                {% for field in form %}
                    <div class="input-group">
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="field-error">{{ field.errors.0 }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
            </div>

            <button type="submit" class="btn-submit">
                <span>СОЗДАТЬ АККАУНТ</span>
                <i class="arrow-icon">→</i>
            </button>
        </form>

        <div class="auth-footer">
            <p>Уже в команде? <a href="{% url 'login' %}">Войти</a></p>
        </div>
    </div>
</div>
{% endblock %}
